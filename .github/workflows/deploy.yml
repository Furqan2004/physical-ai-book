name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - feat/system-overhaul-004

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
        env:
          DOCUSAURUS_BACKEND_URL: ${{ vars.DOCUSAURUS_BACKEND_URL }}
          DOCUSAURUS_BASE_URL: "/physical-ai-book/"

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  # Deploy job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
