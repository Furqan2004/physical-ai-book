name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Looks for the lock file inside the frontend folder
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        # Tells the runner to go into the frontend directory
        working-directory: ./frontend
        run: npm ci

      - name: Build website
        # Runs the build command inside the frontend directory
        working-directory: ./frontend
        env:
          API_URL: ${{ secrets.API_URL || 'http://localhost:8000' }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the resulting static files folder
          path: ./frontend/build

  # Deploy job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
